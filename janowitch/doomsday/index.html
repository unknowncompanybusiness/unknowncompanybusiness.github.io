<style>
  @font-face {
    font-family: "Nunito Sans";
    src: url("assets/NunitoSans-Variable.woff2") format("woff2");
    font-weight: 200 1000;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --red: #e8392b;
    --red-glow: rgba(232, 57, 43, 0.45);
    --bg: #0a0707;
    --card: rgba(18, 13, 13, 0.72);
    --text: #f2eeee;
    --text-dim: #9a8f8f;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: "Nunito Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow-x: hidden;
  }

  /* Blurred cover as ambient background */
  .bg {
    position: fixed;
    inset: -60px;
    background: url("assets/cover.jpg") center / cover no-repeat;
    filter: blur(50px) brightness(0.55) saturate(1.3);
    z-index: -2;
  }
  .bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center 35%, transparent 0%, rgba(10,7,7,0.85) 100%);
  }

  .wrap {
    min-height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 48px 20px 32px;
  }

  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid rgba(255, 255, 255, 0.07);
    border-radius: 24px;
    padding: 28px 28px 24px;
    box-shadow: 0 40px 90px rgba(0, 0, 0, 0.7);
    animation: rise 0.7s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---- Cover + play button ---- */
  .cover-box {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 18px 50px rgba(0, 0, 0, 0.65), 0 0 60px var(--red-glow);
  }
  .cover-box img {
    display: block;
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    transition: transform 0.5s ease, filter 0.3s ease;
  }
  .cover-box:hover img { transform: scale(1.03); }
  .cover-box.playing img { filter: brightness(0.75); }

  .play-btn {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.25);
    opacity: 0;
    transition: opacity 0.25s ease;
  }
  .cover-box:hover .play-btn,
  .cover-box.playing .play-btn { opacity: 1; }
  .play-btn .circle {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: rgba(10, 7, 7, 0.6);
    backdrop-filter: blur(8px);
    border: 1.5px solid rgba(255, 255, 255, 0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.2s ease, background 0.2s ease;
  }
  .cover-box:hover .circle { transform: scale(1.08); background: rgba(232, 57, 43, 0.85); border-color: transparent; }
  .play-btn svg { width: 30px; height: 30px; fill: #fff; }
  .play-btn .icon-pause { display: none; }
  .cover-box.playing .icon-play { display: none; }
  .cover-box.playing .icon-pause { display: block; }

  /* progress bar under cover */
  .progress {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 4px;
    background: rgba(255, 255, 255, 0.12);
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .cover-box.playing .progress, .cover-box.paused .progress { opacity: 1; }
  .progress .fill {
    height: 100%;
    width: 0%;
    background: var(--red);
    box-shadow: 0 0 12px var(--red-glow);
  }

  .preview-hint {
    text-align: center;
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-top: 12px;
  }

  /* ---- Titles ---- */
  .meta { text-align: center; margin: 18px 0 6px; }
  .meta h1 {
    font-size: 30px;
    font-weight: 800;
    letter-spacing: 0.32em;
    margin-right: -0.32em; /* optical centering */
    color: var(--red);
    text-shadow: 0 0 24px var(--red-glow);
  }
  .meta h2 {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.42em;
    margin-right: -0.42em;
    color: var(--text);
    margin-top: 8px;
    text-transform: uppercase;
  }
  .badge {
    display: inline-block;
    margin-top: 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
    border: 1px solid rgba(255, 255, 255, 0.14);
    border-radius: 999px;
    padding: 6px 14px;
  }
  .badge .dot {
    display: inline-block;
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--red);
    margin-right: 7px;
    vertical-align: 1px;
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 var(--red-glow); }
    50%      { box-shadow: 0 0 0 6px transparent; }
  }

  /* ---- Platform buttons ---- */
  .platforms { margin-top: 22px; display: flex; flex-direction: column; gap: 10px; }
  .platform {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: var(--text);
    text-decoration: none;
    font-size: 15px;
    font-weight: 600;
    transition: background 0.2s ease, transform 0.2s ease, border-color 0.2s ease;
  }
  .platform:hover {
    background: rgba(255, 255, 255, 0.1);
    border-color: rgba(255, 255, 255, 0.18);
    transform: translateY(-2px);
  }
  .platform svg { width: 24px; height: 24px; flex-shrink: 0; }
  .platform.soundcloud {
    border-color: rgba(255, 85, 0, 0.45);
    background: rgba(255, 85, 0, 0.08);
  }
  .platform.soundcloud:hover {
    background: rgba(255, 85, 0, 0.15);
    border-color: rgba(255, 85, 0, 0.7);
  }
  .platform.soundcloud .action { background: #FF5500; box-shadow: 0 4px 18px rgba(255, 85, 0, 0.4); }
  .platform.spotify {
    border-color: rgba(29, 185, 84, 0.45);
    background: rgba(29, 185, 84, 0.09);
  }
  .platform.spotify:hover {
    background: rgba(29, 185, 84, 0.16);
    border-color: rgba(29, 185, 84, 0.7);
  }
  .platform.spotify .action { background: #1DB954; box-shadow: 0 4px 18px rgba(29, 185, 84, 0.4); }
  .platform.youtube {
    border-color: rgba(255, 0, 0, 0.45);
    background: rgba(255, 0, 0, 0.08);
  }
  .platform.youtube:hover {
    background: rgba(255, 0, 0, 0.15);
    border-color: rgba(255, 0, 0, 0.7);
  }
  .platform.youtube .action { background: #FF0000; box-shadow: 0 4px 18px rgba(255, 0, 0, 0.4); }
  .platform.soon { opacity: 0.45; pointer-events: none; cursor: default; }
  .platform.soon .action {
    background: rgba(255, 255, 255, 0.1);
    box-shadow: none;
    color: var(--text-dim);
  }
  .platform .action {
    margin-left: auto;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #fff;
    background: var(--red);
    border-radius: 999px;
    padding: 7px 14px;
    box-shadow: 0 4px 18px var(--red-glow);
  }

  footer {
    margin-top: 26px;
    text-align: center;
    font-size: 11px;

    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
  }

  @media (max-width: 440px) {
    .card { padding: 20px 18px 18px; border-radius: 20px; }
    .meta h1 { font-size: 24px; }
  }
</style>

<script>
  const audio = new Audio("assets/preview.mp3?v=2");
  audio.preload = "auto";

  const box = document.getElementById("coverBox");
  const fill = document.getElementById("progressFill");

  box.addEventListener("click", () => {
    if (audio.paused) {
      audio.play();
      box.classList.add("playing");
      box.classList.remove("paused");
    } else {
      audio.pause();
      box.classList.remove("playing");
      box.classList.add("paused");
    }
  });

  audio.addEventListener("timeupdate", () => {
    if (audio.duration) {
      fill.style.width = (audio.currentTime / audio.duration) * 100 + "%";
    }
  });

  audio.addEventListener("ended", () => {
    box.classList.remove("playing", "paused");
    fill.style.width = "0%";
    audio.currentTime = 0;
  });
</script>
